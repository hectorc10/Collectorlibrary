authors:
  post:
    summary: Create a new author
    tags: [Authors]

    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              FirstName:
                type: string
                example: "Gabriel"
              LastName:
                type: string
                example: "Marquez"
              birth_year:
                type: string
                example: "1927"
              nationality:
                type: string
                nullable: true
                example: "Colombian"

    responses:
      "201":
        description: Autor creado con éxito
        content:
          application/json:
            example:
              status: 201
              data:
                id: 1
                FirstName: "Gabriel"
                LastName: "Marquez"
                birth_year: "1927"
                nationality: "Colombian"

      "406":
        description: No se recibieron datos
        content:
          application/json:
            example:
              status: 406
              message: "No se recibieron datos"

      "500":
        description: Error del servidor
        content:
          application/json:
            example:
              status: 500
              message: "Error del servidor"